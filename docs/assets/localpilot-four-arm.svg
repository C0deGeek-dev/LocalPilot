<svg xmlns="http://www.w3.org/2000/svg" width="780" height="556" viewBox="0 0 780 556" role="img" aria-labelledby="t d">
  <title id="t">Four arms, one local model</title>
  <desc id="d">Solve rate per language for four arms on the same pinned local model: raw 25 percent, LocalPilot harness 92 percent, Claude Code on the same model 88 percent, and LocalPilot with learning 93 percent.</desc>
