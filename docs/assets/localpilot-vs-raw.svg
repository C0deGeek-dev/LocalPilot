<svg xmlns="http://www.w3.org/2000/svg" width="780" height="568" viewBox="0 0 780 568" role="img" aria-labelledby="title desc">
  <title id="title">LocalPilot harness versus the raw model</title>
  <desc id="desc">Grouped bars compare solve rates across six languages. LocalPilot achieves 92 percent overall versus 25 percent for the same model used raw, a 67 point improvement.</desc>

  <rect x="0.5" y="0.5" width="779" height="567" rx="12" fill="#0b1218" stroke="#20303a"/>

  <g font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif">
    <text x="28" y="37" font-size="21" font-weight="800" fill="#eef8f5">Same model. A much better loop.</text>
    <text x="28" y="61" font-size="13" fill="#93a5a0">225 Aider-polyglot exercises · six languages · container graded</text>

    <rect x="28" y="77" width="12" height="12" rx="3" fill="#7da7ff"/>
    <text x="48" y="88" font-size="12" font-weight="700" fill="#d8e6e2">LocalPilot harness</text>
    <rect x="184" y="77" width="12" height="12" rx="3" fill="#52636d"/>
    <text x="204" y="88" font-size="12" font-weight="700" fill="#93a5a0">Raw, single-shot</text>
    <text x="738" y="88" text-anchor="end" font-size="11" font-weight="800" letter-spacing="1.2" fill="#f0b75a">UPLIFT</text>

    <g font-family="Cascadia Mono, Consolas, SFMono-Regular, monospace" font-size="10" fill="#6f837e">
      <text x="130" y="116" text-anchor="middle">0</text>
      <text x="260" y="116" text-anchor="middle">25</text>
      <text x="390" y="116" text-anchor="middle">50</text>
      <text x="520" y="116" text-anchor="middle">75</text>
      <text x="650" y="116" text-anchor="middle">100%</text>
    </g>

    <g stroke="#20303a" stroke-width="1">
      <line x1="130" y1="124" x2="130" y2="493"/>
      <line x1="260" y1="124" x2="260" y2="493"/>
      <line x1="390" y1="124" x2="390" y2="493"/>
      <line x1="520" y1="124" x2="520" y2="493"/>
      <line x1="650" y1="124" x2="650" y2="493"/>
    </g>

    <g font-family="Cascadia Mono, Consolas, SFMono-Regular, monospace">
      <g transform="translate(0 137)">
        <text x="108" y="16" text-anchor="end" font-size="13" font-weight="700" fill="#d8e6e2">cpp</text>
        <rect x="130" y="3" width="458" height="12" rx="4" fill="#7da7ff"/>
        <text x="596" y="14" font-size="11" font-weight="800" fill="#a9c3ff">88%</text>
        <rect x="130" y="21" width="42" height="10" rx="4" fill="#52636d"/>
        <text x="180" y="30" font-size="10" fill="#93a5a0">8%</text>
        <rect x="690" y="2" width="60" height="24" rx="12" fill="#251f14" stroke="#5c4725"/>
        <text x="720" y="18" text-anchor="middle" font-size="11" font-weight="800" fill="#f0b75a">+80</text>
      </g>
      <g transform="translate(0 191)">
        <text x="108" y="16" text-anchor="end" font-size="13" font-weight="700" fill="#d8e6e2">java</text>
        <rect x="130" y="3" width="489" height="12" rx="4" fill="#7da7ff"/>
        <text x="627" y="14" font-size="11" font-weight="800" fill="#a9c3ff">94%</text>
        <rect x="130" y="21" width="78" height="10" rx="4" fill="#52636d"/>
        <text x="216" y="30" font-size="10" fill="#93a5a0">15%</text>
        <rect x="690" y="2" width="60" height="24" rx="12" fill="#251f14" stroke="#5c4725"/>
        <text x="720" y="18" text-anchor="middle" font-size="11" font-weight="800" fill="#f0b75a">+79</text>
      </g>
      <g transform="translate(0 245)">
        <text x="108" y="16" text-anchor="end" font-size="13" font-weight="700" fill="#d8e6e2">javascript</text>
        <rect x="130" y="3" width="520" height="12" rx="4" fill="#7da7ff"/>
        <text x="658" y="14" font-size="11" font-weight="800" fill="#a9c3ff">100%</text>
        <rect x="130" y="21" width="151" height="10" rx="4" fill="#52636d"/>
        <text x="289" y="30" font-size="10" fill="#93a5a0">29%</text>
        <rect x="690" y="2" width="60" height="24" rx="12" fill="#251f14" stroke="#5c4725"/>
        <text x="720" y="18" text-anchor="middle" font-size="11" font-weight="800" fill="#f0b75a">+71</text>
      </g>
      <g transform="translate(0 299)">
        <text x="108" y="16" text-anchor="end" font-size="13" font-weight="700" fill="#d8e6e2">go</text>
        <rect x="130" y="3" width="504" height="12" rx="4" fill="#7da7ff"/>
        <text x="642" y="14" font-size="11" font-weight="800" fill="#a9c3ff">97%</text>
        <rect x="130" y="21" width="146" height="10" rx="4" fill="#52636d"/>
        <text x="284" y="30" font-size="10" fill="#93a5a0">28%</text>
        <rect x="690" y="2" width="60" height="24" rx="12" fill="#251f14" stroke="#5c4725"/>
        <text x="720" y="18" text-anchor="middle" font-size="11" font-weight="800" fill="#f0b75a">+69</text>
      </g>
      <g transform="translate(0 353)">
        <text x="108" y="16" text-anchor="end" font-size="13" font-weight="700" fill="#d8e6e2">python</text>
        <rect x="130" y="3" width="504" height="12" rx="4" fill="#7da7ff"/>
        <text x="642" y="14" font-size="11" font-weight="800" fill="#a9c3ff">97%</text>
        <rect x="130" y="21" width="198" height="10" rx="4" fill="#52636d"/>
        <text x="336" y="30" font-size="10" fill="#93a5a0">38%</text>
        <rect x="690" y="2" width="60" height="24" rx="12" fill="#251f14" stroke="#5c4725"/>
        <text x="720" y="18" text-anchor="middle" font-size="11" font-weight="800" fill="#f0b75a">+59</text>
      </g>
      <g transform="translate(0 407)">
        <text x="108" y="16" text-anchor="end" font-size="13" font-weight="700" fill="#d8e6e2">rust</text>
        <rect x="130" y="3" width="348" height="12" rx="4" fill="#7da7ff"/>
        <text x="486" y="14" font-size="11" font-weight="800" fill="#a9c3ff">67%</text>
        <rect x="130" y="21" width="172" height="10" rx="4" fill="#52636d"/>
        <text x="310" y="30" font-size="10" fill="#93a5a0">33%</text>
        <rect x="690" y="2" width="60" height="24" rx="12" fill="#251f14" stroke="#5c4725"/>
        <text x="720" y="18" text-anchor="middle" font-size="11" font-weight="800" fill="#f0b75a">+34</text>
      </g>
      <rect x="108" y="451" width="644" height="43" rx="7" fill="#111c24" stroke="#2a3d49"/>
      <g transform="translate(0 457)">
        <text x="98" y="16" text-anchor="end" font-size="12" font-weight="800" fill="#eef8f5">TOTAL</text>
        <rect x="130" y="3" width="478" height="12" rx="4" fill="#38d6be"/>
        <text x="616" y="14" font-size="11" font-weight="800" fill="#75ead7">92%</text>
        <rect x="130" y="21" width="130" height="10" rx="4" fill="#52636d"/>
        <text x="268" y="30" font-size="10" fill="#93a5a0">25%</text>
        <rect x="690" y="2" width="60" height="24" rx="12" fill="#352713" stroke="#785928"/>
        <text x="720" y="18" text-anchor="middle" font-size="11" font-weight="900" fill="#ffc969">+67</text>
      </g>
    </g>

    <rect x="28" y="514" width="724" height="34" rx="7" fill="#0e211f" stroke="#24554d"/>
    <text x="44" y="536" font-size="13" font-weight="800" fill="#eef8f5">~3.7× the raw solve rate</text>
    <text x="222" y="536" font-size="13" fill="#93a5a0">with the model held constant</text>
    <text x="736" y="536" text-anchor="end" font-size="14" font-weight="900" fill="#38d6be">25% → 92%</text>
  </g>
</svg>
