name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  archives:
    name: archive (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: zip
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.82"
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked -p localpilot --features tui,learning
      # Stage the binary alongside the license files so every archive ships them.
      - name: stage (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/localpilot
          cp target/release/localpilot dist/localpilot/
          cp LICENSE-MIT README.md CHANGELOG.md dist/localpilot/
          tar -C dist -czf localpilot-${{ matrix.target }}.tar.gz localpilot
      - name: stage (windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force dist/localpilot | Out-Null
          Copy-Item target/release/localpilot.exe dist/localpilot/
          Copy-Item LICENSE-MIT, README.md, CHANGELOG.md dist/localpilot/
          Compress-Archive -Path dist/localpilot/* -DestinationPath localpilot-${{ matrix.target }}.zip
      - uses: actions/upload-artifact@v7
        with:
          name: localpilot-${{ matrix.target }}
          path: localpilot-${{ matrix.target }}.${{ matrix.ext }}
      # Publish a GitHub Release on tag pushes and attach this target's archive.
      # Each matrix job extracts the same notes and attaches its own file; the
      # action creates the release once and updates it for the remaining jobs.
      - name: extract release notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          awk -v v="$ver" '$0 ~ "^## v" v "( |$)"{f=1;next} f&&/^## /{exit} f{print}' CHANGELOG.md > RELEASE_NOTES.md
          [ -s RELEASE_NOTES.md ] || echo "Release ${GITHUB_REF_NAME}." > RELEASE_NOTES.md
      - name: publish to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: localpilot-${{ matrix.target }}.${{ matrix.ext }}
