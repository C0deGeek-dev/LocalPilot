name: ci

on:
  push:
    branches: [main]
  pull_request:

# Full debuginfo across 74 test binaries makes the target dir outgrow the
# hosted ubuntu runner's free disk; the runner then wedges mid-run and dies
# as "lost communication" with no logs. Line tables keep panic file:line in
# failures at a fraction of the size. (The test profile inherits dev.)
env:
  CARGO_PROFILE_DEV_DEBUG: line-tables-only

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # A green run takes ~5 minutes warm; the cap turns a starved runner
    # ("lost communication", no logs) into a fast, attributable failure.
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.82"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # Prebuilt nextest binary; install-action does not build from source, so the
      # pinned 1.82 toolchain does not constrain the runner version.
      - uses: taiki-e/install-action@nextest
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # Disk headroom before and after the heaviest step: the failure mode this
      # guards is the runner filling its disk and dying without uploading logs,
      # so the evidence has to be printed while the machine is still healthy.
      - run: df -h .
        shell: bash
      # Unit + integration tests via nextest. Fallback without nextest installed:
      # `cargo test --workspace`. nextest does not run doctests, so run those too.
      #
      # On hosted ubuntu this step has wedged to the job ceiling — with its log
      # lost — on every run since the 2026-07-08 runner-agent rollout
      # (2.335.1 → 2.336.0), while windows/macos and a local Linux run of the
      # same commit pass in minutes. Contain it on Linux: output goes to a
      # file (a leaked child can hold a file handle without holding the
      # step's output pipe open, so the step can end) and a hard timeout kills
      # a wedged nextest with its progress preserved; the tail step then names
      # exactly what was running.
      - if: runner.os != 'Linux'
        run: cargo nextest run --workspace
      # The bash `timeout -k` in the first containment attempt never fired —
      # the wedged process survives SIGKILL, which points at an uninterruptible
      # (D-state) kernel I/O stall on the hosted runner's disk. A step-level
      # timeout makes the *runner* abandon the step, so the job completes
      # instead of dying log-less at the job ceiling; the follow-ups then
      # capture nextest's progress, the process table, and the kernel's
      # hung-task traces, and the last step keeps the job honestly red until
      # the wedge is actually fixed.
      - id: nextest-linux
        if: runner.os == 'Linux'
        continue-on-error: true
        timeout-minutes: 20
        shell: bash
        run: timeout -k 30s 18m cargo nextest run --workspace > nextest-run.log 2>&1
      - if: runner.os == 'Linux' && always()
        shell: bash
        run: |
          tail -n 300 nextest-run.log || true
          echo "=== process table (oldest last) ==="
          ps -ef --sort=start_time | tail -n 30 || true
          echo "=== kernel hung-task / I/O traces ==="
          sudo dmesg | tail -n 150 || true
      - if: runner.os == 'Linux' && always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-wedge-log
          path: nextest-run.log
          retention-days: 7
      - if: runner.os == 'Linux' && steps.nextest-linux.outcome != 'success'
        shell: bash
        run: echo "::error::linux nextest step did not succeed (wedge or failures — see nextest-wedge-log)"; exit 1
      - run: df -h .
        shell: bash
      - run: cargo test --doc --workspace
      - run: cargo check --workspace
      # The vendored LocalMind engine is its own workspace; run its suite so a
      # broken vendored test fails this build and the pinned commit's behavior
      # stays verified on every OS.
      - run: cargo nextest run --workspace --manifest-path external/localmind/Cargo.toml
      - run: cargo test --doc --workspace --manifest-path external/localmind/Cargo.toml
      # The interactive TUI (`chat`) is behind an opt-in feature; lint, build, and
      # test it here so the terminal driver — including the inline scrollback-commit
      # fidelity tests — is covered on every OS.
      - run: cargo clippy -p localpilot --features tui,learning --all-targets -- -D warnings
      - run: cargo build -p localpilot --features tui,learning
      # Run the binary's own unit tests under the TUI feature (the inline-driver
      # scrollback-commit tests live here). Scoped to the bin: the integration tests
      # under tests/ are not feature-dependent and already run in the workspace step.
      - run: cargo nextest run -p localpilot --features tui,learning --bin localpilot

  coverage:
    name: coverage (line floor)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.82"
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - run: df -h .
      # Line-coverage floor over the workspace. The floor is a ratchet: set
      # from the measured baseline, raised deliberately, never lowered to
      # admit a regression.
      #
      # Same containment as the ubuntu test job (see its nextest step): a
      # step-level timeout completes the job so the logs survive, and the
      # follow-ups capture progress, processes, and kernel hung-task traces.
      - id: cov-nextest
        continue-on-error: true
        timeout-minutes: 25
        run: timeout -k 30s 23m cargo llvm-cov nextest --workspace --fail-under-lines 75 > coverage-run.log 2>&1
      - if: always()
        run: |
          tail -n 300 coverage-run.log || true
          echo "=== process table (oldest last) ==="
          ps -ef --sort=start_time | tail -n 30 || true
          echo "=== kernel hung-task / I/O traces ==="
          sudo dmesg | tail -n 150 || true
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-wedge-log
          path: coverage-run.log
          retention-days: 7
      - if: steps.cov-nextest.outcome != 'success'
        run: echo "::error::coverage nextest step did not succeed (wedge or failures — see coverage-wedge-log)"; exit 1
      - run: df -h .
      - run: cargo llvm-cov report --lcov --output-path coverage.lcov
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage.lcov
          retention-days: 14

  supply-chain:
    name: supply-chain (advisories, licenses, bans, unused deps)
    runs-on: ubuntu-latest
    # Blocking before the v1 release (docs/14 §4, docs/09 release checklist).
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.82"
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit,cargo-machete
      - run: cargo deny check
      - run: cargo audit
      - run: cargo machete

  lockfile-guard:
    name: lockfile guard (no unexplained Cargo.lock drift)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # A Cargo.lock change without a matching manifest change means a
      # dependency moved without a deliberate decision (docs/13 §1: pins are
      # exact; bumps are their own commit). Surface it as a failure so the
      # change is explained, not silent.
      - name: fail on lockfile-only dependency drift
        run: |
          base="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}" --depth=1
          changed="$(git diff --name-only "$base"...HEAD)"
          if echo "$changed" | grep -qx "Cargo.lock"; then
            if ! echo "$changed" | grep -q "Cargo.toml"; then
              echo "Cargo.lock changed without any Cargo.toml change."
              echo "Dependency moves must come from a manifest decision."
              exit 1
            fi
          fi

  install-smoke:
    name: clean-environment install smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.82"
      - uses: Swatinem/rust-cache@v2
      # Install exactly what a user would get, from the locked graph, into a
      # fresh root; then prove the produced binary runs.
      - run: cargo install --path crates/localpilot-cli --locked --root "$RUNNER_TEMP/install-smoke"
      - run: '"$RUNNER_TEMP/install-smoke/bin/localpilot" --help'

  doc-drift:
    name: doc drift guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: No retired PowerShell/.NET stack described as current
        shell: bash
        run: |
          # The v2.0.0 native-Rust rewrite retired the PowerShell module and .NET
          # TUI. Docs may reference them only as tagged history, never as current.
          hits=$(grep -rniE '(Install-Module|\bPester\b|PSScriptAnalyzer|\.psm1|\.psd1)' \
                   docs README.md --include='*.md' 2>/dev/null \
                 | grep -viE 'retired|removed|history|migrat|1\.x|legacy|no longer' || true)
          if [ -n "$hits" ]; then
            echo "::error::a doc describes the retired PowerShell/.NET stack as current:"
            echo "$hits"
            exit 1
          fi
          echo "no retired-stack language in docs."
